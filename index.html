<style>
:root{

  --acc:#0e7a6d; --acc2:#c2571f; --chip:#ece8de; --done:#9aa39b; --gold:#b98a2f;
  --shadow:0 1px 3px rgba(60,50,30,.10);
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#191713; --card:#242119; --ink:#ece7dc; --sub:#9c948a; --line:#3a352b;
    --acc:#3db3a2; --acc2:#e08a4e; --chip:#2f2b22; --done:#6b7268; --gold:#d3a54a;
    --shadow:0 1px 3px rgba(0,0,0,.4); }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{margin:0; background:var(--bg); color:var(--ink);
  font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  line-height:1.6; padding-bottom:40px}
header{position:sticky; top:0; z-index:50; background:var(--bg);
  border-bottom:1px solid var(--line); padding:10px 12px 0}
h1{font-size:1.05rem; margin:0 0 2px; display:flex; align-items:baseline; gap:8px}
h1 small{color:var(--sub); font-weight:400; font-size:.75rem}
#now{font-size:.78rem; color:var(--acc); min-height:1.2em; margin-bottom:6px}
nav{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex:0 0 auto; border:1px solid var(--line); background:var(--chip); color:var(--ink);
  border-radius:18px; padding:6px 12px; font-size:.85rem; cursor:pointer; white-space:nowrap}
nav button.on{background:var(--acc); border-color:var(--acc); color:#fff; font-weight:700}
main{max-width:640px; margin:0 auto; padding:12px}
.dayhead{margin:4px 2px 12px}
.dayhead .d{font-size:1.25rem; font-weight:800}
.dayhead .s{color:var(--sub); font-size:.85rem}
.ev{background:var(--card); border:1px solid var(--line); border-radius:14px;
  margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden}
.ev.hl{border-color:var(--acc); box-shadow:0 0 0 2px var(--acc)}
.ev>.top{display:flex; gap:10px; padding:11px 12px; cursor:pointer; align-items:flex-start}
.tm{flex:0 0 52px; text-align:center}
.tm .t{font-weight:800; font-size:.95rem; font-variant-numeric:tabular-nums}
.tm .dur{font-size:.66rem; color:var(--sub)}
.bd{flex:1; min-width:0}
.bd .ti{font-weight:700; font-size:.95rem}
.lo{display:block; font-size:.78rem; color:var(--sub); margin-top:2px; text-decoration:none}
.lo .gm{display:inline-block; color:var(--acc); font-size:.7rem; margin-left:6px;

  vertical-align:middle; line-height:1.3; font-weight:700}
.lo .gm:active{background:var(--acc); color:#fff}
.cost{display:inline-block; margin-top:4px; font-size:.72rem; color:var(--gold);

.rt{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:5px; min-width:46px}
.area{font-size:.6rem; line-height:1.2; text-align:center; padding:2px 5px; border-radius:8px;

.foodlink{font-size:.6rem; line-height:1.2; text-align:center; padding:2px 6px; border-radius:8px;

  text-decoration:none; cursor:pointer; font-weight:700; white-space:nowrap}
.seg{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:9px 12px;

.seg-h{display:flex; align-items:center; gap:7px; flex-wrap:wrap}
.seg-d{font-size:.7rem; color:#fff; background:var(--acc); border-radius:6px; padding:1px 7px;

.seg-b{font-size:.8rem; color:var(--ink); margin-top:5px}
.seg-n{color:var(--sub)}

.dt ol li{margin-bottom:5px}
.dt .tip{background:var(--chip); border-radius:10px; padding:8px 10px; margin:8px 0; font-size:.8rem}
.dt .tip b{color:var(--acc2)}
.dt .alt{border-left:3px solid var(--acc2); padding:2px 10px; margin:8px 0; font-size:.8rem; color:var(--sub)}
.dt .jp{font-size:.8rem; color:var(--sub); margin-top:6px}
.dt .jp span{display:block; color:var(--ink)}
.sec{font-weight:800; font-size:.95rem; margin:20px 4px 8px; color:var(--acc)}
.list{background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow)}

.list .it:last-child{border-bottom:none}

.list .it.done .bx{background:var(--acc); border-color:var(--acc); color:#fff}
.list .it.done .tx{color:var(--done); text-decoration:line-through}
.list .it .tx b{display:block; font-size:.88rem}
.list .it .tx i{font-style:normal; font-size:.76rem; color:var(--sub)}
table{width:100%; border-collapse:collapse; background:var(--card); border-radius:14px; overflow:hidden;
  border:1px solid var(--line); box-shadow:var(--shadow); font-size:.84rem}
th,td{padding:8px 10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top}
th{background:var(--chip); font-size:.78rem}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
.note{font-size:.78rem; color:var(--sub); margin:8px 4px}
.big{font-size:1.05rem; font-weight:800; color:var(--acc)}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);

.card h3{margin:0 0 6px; font-size:.92rem}
.card p{margin:4px 0}
.card .jpaddr{background:var(--chip); border-radius:8px; padding:6px 9px; margin:6px 0; font-size:.82rem}
.reset{display:block; margin:26px auto 0; border:1px solid var(--line); background:none; color:var(--sub);
  border-radius:10px; padding:6px 14px; font-size:.75rem; cursor:pointer}
.schematic{width:100%; height:auto; display:block}
.maptag{display:inline-block; font-size:.68rem; color:var(--sub); background:var(--chip); border-radius:8px; padding:1px 8px; margin:-2px 0 8px}
.badge{display:inline-block; font-size:.68rem; border-radius:8px; padding:0 6px; margin-left:6px;
  background:var(--acc2); color:#fff; vertical-align:2px}
</style>

/* ---------- 地圖(離線示意圖) ---------- */
function pill(cx,cy,text){
  var w=Math.max(58, 15+text.length*7.3);
  return '<rect x="'+(cx-w/2)+'" y="'+(cy-11)+'" width="'+w+'" height="16" rx="8" fill="var(--chip)"/>'+
    '<text x="'+cx+'" y="'+(cy+1)+'" text-anchor="middle" font-size="10" font-weight="600" fill="var(--acc2)">'+text+'</text>';
}
/* 逐點縱向動線圖:每點含 label(地名)/label2(小字說明)/via(與上一點的交通方式+時間) */
function svgMap(pts){
  var W=300, GAP=100, TOP=32, BOT=48, x=W/2;
  var H=TOP+(pts.length-1)*GAP+BOT;
  var s='<svg viewBox="0 0 '+W+' '+H+'" class="schematic">';
  var path=pts.map(function(p,i){return (i===0?'M':'L')+x+','+(TOP+i*GAP)}).join(' ');
  s+='<path d="'+path+'" fill="none" stroke="var(--acc)" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>';
  pts.forEach(function(p,i){
    var y=TOP+i*GAP;
    if(i>0 && p.via) s+=pill(x, TOP+(i-1)*GAP+GAP*0.62, p.via);
    s+='<circle cx="'+x+'" cy="'+y+'" r="11" fill="var(--card)" stroke="var(--acc)" stroke-width="2.5"/>';
    s+='<text x="'+x+'" y="'+(y+4)+'" text-anchor="middle" font-size="11" font-weight="700" fill="var(--acc)">'+(i+1)+'</text>';
    if(p.t) s+='<text x="'+(x+22)+'" y="'+(y+4)+'" text-anchor="start" font-size="9.5" font-weight="700" fill="var(--acc2)">'+p.t+'</text>';
    s+='<text x="'+x+'" y="'+(y+26)+'" text-anchor="middle" font-size="11" fill="var(--ink)">'+p.label+'</text>';
    if(p.label2) s+='<text x="'+x+'" y="'+(y+40)+'" text-anchor="middle" font-size="9.5" fill="var(--sub)">'+p.label2+'</text>';
  });
  s+='</svg>';
  return s;
}

         '<div class="ph-sub">'+p.romaji+'｜'+p.zh+'</div></div>'+

  h+='<div class="card">'+
    '<p><b>觀念</b>:假名是「拼音字」,每個固定一個音、拼起來唸就對,不用像漢字一個個背。漢字你多半看得懂、<b>片假名照唸多是外來語</b>、平假名是文法可略過。</p>'+
    '<p><b>5 母音(基礎)</b>:ア a(啊)・イ i(衣)・ウ u(烏)・エ e(欸)・オ o(喔)</p>'+
    '<table><tr><th>子音</th><th>a</th><th>i</th><th>u</th><th>e</th><th>o</th></tr>'+
    '<tr><th>k</th><td>カ ka</td><td>キ ki</td><td>ク ku</td><td>ケ ke</td><td>コ ko</td></tr>'+
    '<tr><th>s</th><td>サ sa</td><td>シ shi</td><td>ス su</td><td>セ se</td><td>ソ so</td></tr>'+
    '<tr><th>t</th><td>タ ta</td><td>チ chi</td><td>ツ tsu</td><td>テ te</td><td>ト to</td></tr>'+
    '<tr><th>n</th><td>ナ na</td><td>ニ ni</td><td>ヌ nu</td><td>ネ ne</td><td>ノ no</td></tr>'+
    '<tr><th>h</th><td>ハ ha</td><td>ヒ hi</td><td>フ fu</td><td>ヘ he</td><td>ホ ho</td></tr>'+
    '<tr><th>m</th><td>マ ma</td><td>ミ mi</td><td>ム mu</td><td>メ me</td><td>モ mo</td></tr>'+
    '<tr><th>r</th><td>ラ ra</td><td>リ ri</td><td>ル ru</td><td>レ re</td><td>ロ ro</td></tr></table>'+
    '<p class="note">其餘:ヤ ya・ユ yu・ヨ yo・ワ wa・ヲ o・ン n。濁點 カ→ガ ga、ハ→バ ba;加圈 ハ→パ pa。「ー」把前一個母音拉長。</p>'+
    '<p><b>拆解範例</b>:ラーメン = ra+(拉長)+me+n → <b>拉麵</b>;カレー=咖哩;ビール=啤酒;コーヒー=咖啡;タクシー=taxi;セット=套餐。</p>'+
    '<p>看不懂就用 <b>Google 翻譯 App → 相機</b> 對準日文即翻中文(可離線,出發前先下載「日文↔中文」離線包),還能唸給你聽。</p></div>';
  h+='<div class="sec">🈶 看得懂、但意思不同的漢字</div>';
  h+='<div class="card">'+
    '<table><tr><th>日文</th><th>意思</th><th>日文</th><th>意思</th></tr>'+

    '<tr><td>食べ放題</td><td>吃到飽</td><td>一泊二食</td><td>一晚含早晚餐</td></tr>'+

  return h;

function show(id){
  Array.prototype.forEach.call(nav.children,function(b){b.classList.toggle('on',b.dataset.id===id)});
  var day=null;
  for(var i=0;i<DAYS.length;i++) if(DAYS[i].id===id) day=DAYS[i];
  if(day) main.innerHTML=renderDay(day);
  else if(id==='overview') main.innerHTML=renderOverview();
  else if(id==='food') main.innerHTML=renderFood();
  else if(id==='stay') main.innerHTML=renderStay();
  else if(id==='move') main.innerHTML=renderMove();
  else if(id==='lang') main.innerHTML=renderLang();
  else if(id==='maps') main.innerHTML=renderMaps();
  else if(id==='budget') main.innerHTML=renderBudget();
  else if(id==='info') main.innerHTML='<div class="dayhead"><div class="d">ℹ️ 實用資訊</div></div>'+INFO_HTML+
    '<button class="reset" onclick="if(confirm(\'清除所有勾選紀錄?\')){localStorage.removeItem(\'hk26_ev\');localStorage.removeItem(\'hk26_pk\');location.reload()}">重設所有勾選</button>';
  window.scrollTo(0,0);
  if(day) highlightNow(day);
  store.set('tab',{id:id});
}

window.toggleEv=function(el){ el.classList.toggle('open'); };
window.toggleDone=function(key){
  doneEv[key]=!doneEv[key]; store.set('ev',doneEv);
  var el=document.getElementById('ev_'+key); if(el) el.classList.toggle('done',!!doneEv[key]);
};
window.togglePk=function(el,key){
  donePk[key]=!donePk[key]; store.set('pk',donePk);
  el.classList.toggle('done',!!donePk[key]);
};

/* 點總覽/地圖上的地點 → 切到地圖頁並捲動到該區路線圖 */
window.jumpArea=function(id){
  if(!AREA_MAP[id]) return;
  var go=function(){ var el=document.getElementById('areamap-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); };
  var onMaps=false;
  Array.prototype.forEach.call(nav.children,function(b){ if(b.dataset.id==='maps'&&b.classList.contains('on')) onMaps=true; });
  if(onMaps){ go(); } else { show('maps'); setTimeout(go,80); }
};

/* 日語發音:用手機內建 TTS 唸(離線可用) */
var JP_VOICE=null;
function pickJa(){ try{ var vs=speechSynthesis.getVoices(); var v=vs.find(function(x){return /ja(-|_)?JP/i.test(x.lang)||/Kyoko|O-ren|Otoya|Hattori|Ichiro|Japan|日本/i.test(x.name);}); if(v) JP_VOICE=v; }catch(e){} }
if('speechSynthesis' in window){ pickJa(); try{ speechSynthesis.onvoiceschanged=pickJa; }catch(e){} }
window.speak=function(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=0.9;
    if(JP_VOICE) u.voice=JP_VOICE;
    speechSynthesis.speak(u);
  }catch(e){}
};

/* 點事件卡右側的區域「🍜」→ 切到美食頁並捲到該區 */
window.jumpFood=function(key){
  var go=function(){ var el=document.getElementById('food-'+key); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); };
  var onFood=false;
  Array.prototype.forEach.call(nav.children,function(b){ if(b.dataset.id==='food'&&b.classList.contains('on')) onFood=true; });
  if(onFood){ go(); } else { show('food'); setTimeout(go,80); }
};

/* 「現在該做什麼」:日期符合時高亮當前事件 */
function pad(n){return (n<10?'0':'')+n}
function highlightNow(day){
  var now=new Date();
  var today=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  if(day.date!==today) return;
  var cur=pad(now.getHours())+':'+pad(now.getMinutes());
  var idx=-1;
  day.events.forEach(function(ev,i){ if(ev.t<=cur) idx=i; });
  if(idx<0) idx=0;
  var el=document.getElementById('ev_'+day.id+'_'+idx);
  if(el){ el.classList.add('hl'); el.classList.add('open');
    setTimeout(function(){ el.scrollIntoView({behavior:'smooth',block:'center'}) },150); }
}
function tickNow(){
  var now=new Date();
  var today=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  var d=null; DAYS.forEach(function(x){ if(x.date===today) d=x; });
  var el=document.getElementById('now');
  if(d){ el.textContent='📅 今天是旅程「'+d.tab+'」— 已自動標亮現在時段(日本時間以手機為準)'; }
  else{
    var t0=new Date('2026-08-26T00:00:00');
    var diff=Math.ceil((t0-now)/86400000);
    el.textContent = diff>0 ? '⏳ 距離出發還有 '+diff+' 天' : (now>new Date('2026-08-31T00:00:00')?'🎉 旅程已完成,歡迎回家!':'');
  }
}

/* 啟動:旅程期間自動開當日頁,否則開上次頁或準備頁 */
(function(){
  tickNow(); setInterval(tickNow,60000);
  var now=new Date();
  var today=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  var open=null;
  DAYS.forEach(function(x){ if(x.date===today) open=x.id; });
  if(!open){ var last=store.get('tab'); open=(last&&last.id)?last.id:'overview'; }
  show(open);
})();

/* 註冊 Service Worker:首次連線後把整份行程快取,之後完全離線可用 */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
